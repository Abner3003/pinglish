name: API CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      # - name: Testes
      #   run: npm test

      - name: Build
        run: npm run build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag e push da imagem
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          : "${REGISTRY:?REGISTRY não definido}"
          : "${REPOSITORY:?REPOSITORY não definido}"
          : "${IMAGE_TAG:?IMAGE_TAG não definido}"

          echo "Registry: $REGISTRY"
          echo "Repository: $REPOSITORY"
          echo "Tag: $IMAGE_TAG"

          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          IMAGE_LATEST="$REGISTRY/$REPOSITORY:latest"

          docker buildx build \
            --file Dockerfile \
            --tag "$IMAGE_URI" \
            --tag "$IMAGE_LATEST" \
            --push \
            .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configurar SSH
        run: |
          set -euo pipefail
          : "${{ secrets.EC2_HOST }}"
          : "${{ secrets.EC2_USER }}"
          : "${{ secrets.EC2_SSH_KEY }}"

          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 30 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy na EC2
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            AWS_ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)
            IMAGE_URI=\$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin \$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            docker pull \$IMAGE_URI

            docker run --rm \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI \
              npx prisma migrate deploy

            docker stop pinglish-api pinglish-worker-leads pinglish-worker-interactions || true
            docker rm pinglish-api pinglish-worker-leads pinglish-worker-interactions || true
            docker image prune -f

            docker run -d \
              --name pinglish-api \
              --restart always \
              -p 3000:3000 \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI

            docker run -d \
              --name pinglish-worker-leads \
              --restart always \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI \
              node dist/jobs/leads-events.consumer.js

            docker run -d \
              --name pinglish-worker-interactions \
              --restart always \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI \
              node dist/jobs/interactions-events.consumer.js

            docker container prune -f
            docker image prune -af
            docker builder prune -af
            docker volume prune -f
          EOF
