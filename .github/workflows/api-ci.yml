name: API CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      # - name: Testes
      #   run: npm test

      - name: Build
        run: npm run build

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar configuração do ECR
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error title=AWS_REGION ausente::O secret AWS_REGION está vazio ou não foi definido."
            exit 1
          fi

          if [ -z "${REGISTRY:-}" ]; then
            echo "::error title=Registry ausente::O login no ECR não retornou registry. Verifique as credenciais AWS e a action amazon-ecr-login."
            exit 1
          fi

          if [ -z "${REPOSITORY:-}" ]; then
            echo "::error title=ECR_REPOSITORY ausente::O secret ECR_REPOSITORY está vazio ou não foi definido."
            exit 1
          fi

          if ! aws sts get-caller-identity >/dev/null 2>&1; then
            echo "::error title=AWS inválida::Não foi possível validar as credenciais AWS no runner."
            exit 1
          fi

          if ! aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$REPOSITORY" >/dev/null 2>&1; then
            echo "::error title=Repositório ECR não encontrado::O repositório '$REPOSITORY' não existe na região '$AWS_REGION' para a conta AWS configurada no workflow."
            exit 1
          fi

          echo "ECR validado com sucesso:"
          echo "  region=$AWS_REGION"
          echo "  registry=$REGISTRY"
          echo "  repository=$REPOSITORY"

      - name: Build, tag e push da imagem
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${REGISTRY:-}" ]; then
            echo "::error title=Registry ausente::A action de login no ECR não retornou um registry válido."
            exit 1
          fi

          if [ -z "${REPOSITORY:-}" ]; then
            echo "::error title=ECR_REPOSITORY ausente::O secret ECR_REPOSITORY está vazio ou não foi definido."
            exit 1
          fi

          if [ -z "${IMAGE_TAG:-}" ]; then
            echo "::error title=IMAGE_TAG ausente::O SHA do commit não foi definido no job docker."
            exit 1
          fi

          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          IMAGE_LATEST="$REGISTRY/$REPOSITORY:latest"

          echo "Buildando imagens:"
          echo "  image_uri=$IMAGE_URI"
          echo "  image_latest=$IMAGE_LATEST"

          docker buildx build \
            --file Dockerfile \
            --tag "$IMAGE_URI" \
            --tag "$IMAGE_LATEST" \
            --push \
            .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configurar SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${EC2_HOST:?EC2_HOST não definido}"
          : "${EC2_USER:?EC2_USER não definido}"
          : "${EC2_SSH_KEY:?EC2_SSH_KEY não definido}"

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          touch ~/.ssh/known_hosts
          ssh-keyscan -T 30 -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy na EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST:-}" ]; then
            echo "::error title=EC2_HOST ausente::O secret EC2_HOST está vazio ou não foi definido."
            exit 1
          fi

          if [ -z "${EC2_USER:-}" ]; then
            echo "::error title=EC2_USER ausente::O secret EC2_USER está vazio ou não foi definido."
            exit 1
          fi

          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error title=AWS_REGION ausente::O secret AWS_REGION está vazio ou não foi definido."
            exit 1
          fi

          if [ -z "${ECR_REPOSITORY:-}" ]; then
            echo "::error title=ECR_REPOSITORY ausente::O secret ECR_REPOSITORY está vazio ou não foi definido."
            exit 1
          fi

          if [ -z "${IMAGE_TAG:-}" ]; then
            echo "::error title=IMAGE_TAG ausente::O SHA do commit não foi definido no job deploy."
            exit 1
          fi

          echo "Iniciando deploy:"
          echo "  ec2_host=$EC2_HOST"
          echo "  aws_region=$AWS_REGION"
          echo "  ecr_repository=$ECR_REPOSITORY"
          echo "  image_tag=$IMAGE_TAG"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$EC2_USER@$EC2_HOST" << EOF
            set -euo pipefail

            if [ -z "${AWS_REGION:-}" ]; then
              echo "ERRO: AWS_REGION não chegou à sessão remota."
              exit 1
            fi

            if [ -z "${ECR_REPOSITORY:-}" ]; then
              echo "ERRO: ECR_REPOSITORY não chegou à sessão remota."
              exit 1
            fi

            if [ -z "${IMAGE_TAG:-}" ]; then
              echo "ERRO: IMAGE_TAG não chegou à sessão remota."
              exit 1
            fi

            AWS_ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)
            IMAGE_URI=\$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

            echo "Preparando pull da imagem:"
            echo "  aws_account_id=\$AWS_ACCOUNT_ID"
            echo "  aws_region=$AWS_REGION"
            echo "  ecr_repository=$ECR_REPOSITORY"
            echo "  image_tag=$IMAGE_TAG"
            echo "  image_uri=\$IMAGE_URI"

            if ! aws ecr describe-repositories --region $AWS_REGION --repository-names $ECR_REPOSITORY >/dev/null 2>&1; then
              echo "ERRO: O repositório ECR '$ECR_REPOSITORY' não existe ou não está acessível na região '$AWS_REGION' a partir da EC2."
              exit 1
            fi

            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin \$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            docker stop pinglish-api pinglish-worker-leads pinglish-worker-interactions || true
            docker rm pinglish-api pinglish-worker-leads pinglish-worker-interactions || true
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker volume prune -f || true

            echo "Executando docker pull de \$IMAGE_URI"
            docker pull \$IMAGE_URI

            docker run --rm \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI \
              npx prisma migrate deploy

            docker run -d \
              --name pinglish-api \
              --restart always \
              -p 3000:3000 \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI

            docker run -d \
              --name pinglish-worker-leads \
              --restart always \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI \
              node dist/jobs/leads-events.consumer.js

            docker run -d \
              --name pinglish-worker-interactions \
              --restart always \
              --env-file /opt/pinglish/.env \
              \$IMAGE_URI \
              node dist/jobs/interactions-events.consumer.js

            docker container prune -f
            docker image prune -af
            docker builder prune -af
            docker volume prune -f
          EOF
